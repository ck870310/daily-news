<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日政经简报</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --text-main: #2c3e50;
            --text-second: #7f8c8d;
            --card-bg: #ffffff;
            --tag-bg: #fffcf0; 
            --tag-text: #b89824;
            --tag-border: #f0e6c2;
            --highlight-bg: #fff0f2;
            --highlight-text: #d9534f;
            --color-all: #8391a1;   
            --color-cn: #d98880;    
            --color-us: #7fb3d5;    
            --color-eu: #82e0aa;    
            --color-other: #f0b27a; 
        }
        body {
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 35px 20px;
            display: flex; justify-content: center;
        }
        .container { max-width: 800px; width: 100%; }
        header { margin-bottom: 25px; text-align: center; }
        h1 { 
            font-size: 34px; margin: 0; font-weight: 800; 
            background: linear-gradient(135deg, #2c3e50, #54728f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .date { color: var(--text-second); font-size: 14px; margin-top: 5px; }

        .tracker-module {
            background: #ffffff; border-radius: 20px; padding: 20px; margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #e1e8ed;
        }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        .tracker-input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        .tracker-btn { background: var(--color-us); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .active-keywords { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .user-tag { background: #f0f4f8; color: var(--color-us); padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }

        .tabs { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; overflow-x: auto; }
        .tab { padding: 8px 18px; border-radius: 20px; background: #fff; color: var(--text-second); cursor: pointer; border: 1px solid #e1e8ed; font-weight: 600; white-space: nowrap; }
        .tab.active[data-region="全部"] { background: var(--color-all); color: #fff; }
        .tab.active[data-region="中国"] { background: var(--color-cn); color: #fff; }
        .tab.active[data-region="美国"] { background: var(--color-us); color: #fff; }
        .tab.active[data-region="欧洲"] { background: var(--color-eu); color: #fff; }
        .tab.active[data-region="其他"] { background: var(--color-other); color: #fff; }

        .news-list { display: flex; flex-direction: column; gap: 24px; }
        .card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); text-decoration: none; color: inherit;
            transition: 0.3s; display: block; position: relative; border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.08); }
        .card.important::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--highlight-text); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .source { font-weight: 700; color: #aeb6bf; font-size: 12px; }
        .tag { background: var(--tag-bg); color: var(--tag-text); padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 5px; }
        .title { font-size: 19px; font-weight: 700; margin: 0 0 10px 0; line-height: 1.4; }
        .summary { font-size: 15px; color: var(--text-second); line-height: 1.7; text-align: justify; }
        .keyword-badge { background: var(--highlight-bg); color: var(--highlight-text); padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="pageTitle">今日政经简报</h1>
            <div class="date" id="currentDate"></div>
        </header>

        <div class="tracker-module">
            <div style="font-size:14px; font-weight:600;">🎯 实时关键词追踪 (网页端)</div>
            <div class="input-group">
                <input type="text" id="kwInput" class="tracker-input" placeholder="输入词汇回车高亮并置顶...">
                <button id="addBtn" class="tracker-btn">添加</button>
            </div>
            <div class="active-keywords" id="kwContainer"></div>
        </div>

        <div class="tabs">
            <button class="tab active" data-region="全部">全部</button>
            <button class="tab" data-region="中国">中国</button>
            <button class="tab" data-region="美国">美国</button>
            <button class="tab" data-region="欧洲">欧洲</button>
            <button class="tab" data-region="其他">其他</button>
        </div>
        <div class="news-list" id="newsContainer"></div>
    </div>

    <script src="news_data.js" charset="utf-8"></script>
    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
        const container = document.getElementById('newsContainer');
        const kwInput = document.getElementById('kwInput');
        let dynamicKws = [];

        function render() {
            if (typeof newsData === 'undefined') return;
            const region = document.querySelector('.tab.active').dataset.region;
            container.innerHTML = '';
            
            let data = JSON.parse(JSON.stringify(newsData));
            if (dynamicKws.length > 0) {
                data.forEach(n => {
                    const txt = (n.title + n.summary).toLowerCase();
                    const hit = dynamicKws.find(k => txt.includes(k.toLowerCase()));
                    if (hit) { n.isImportant = true; n.keyword = hit; }
                });
            }

            let filtered = region === '全部' ? data : data.filter(n => n.region === region);
            filtered.sort((a,b) => (b.isImportant?1:0) - (a.isImportant?1:0));

            filtered.forEach(n => {
                const card = document.createElement('a');
                card.href = n.url; card.target = "_blank"; // 这里保留了跳转功能
                card.className = n.isImportant ? "card important" : "card";
                card.innerHTML = `
                    <div class="card-header">
                        <span class="source">${n.source}</span>
                        <div style="display:flex;">
                            ${n.isImportant ? `<span class="keyword-badge">🎯 ${n.keyword}</span>` : ''}
                            <span class="tag">${n.region}</span>
                            <span class="tag">${n.type}</span>
                        </div>
                    </div>
                    <div class="title">${n.title}</div>
                    <div class="summary">${n.summary}</div>
                `;
                container.appendChild(card);
            });
        }

        document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
            document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
            t.classList.add('active'); render();
        });

        const addKw = () => {
            const v = kwInput.value.trim();
            if(v && !dynamicKws.includes(v)) { 
                dynamicKws.push(v); 
                const s = document.createElement('span'); s.className='user-tag'; s.textContent=v;
                s.onclick = () => { dynamicKws = dynamicKws.filter(k=>k!==v); s.remove(); render(); };
                document.getElementById('kwContainer').appendChild(s);
                render();
            }
            kwInput.value = '';
        };
        document.getElementById('addBtn').onclick = addKw;
        kwInput.onkeypress = e => e.key==='Enter' && addKw();
        window.onload = render;
    </script>
</body>
</html>
