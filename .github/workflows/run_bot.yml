name: 每日二次自动抓取

on:
  schedule:
    # 23:00 UTC 是北京时间 07:00
    # 06:00 UTC 是北京时间 14:00
    - cron: '0 23,6 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码库
        uses: actions/checkout@v3

      - name: 准备 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install feedparser zhipuai sniffio httpx

      - name: 运行 AI 读报机器人
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python news_bot.py

      - name: 自动保存生成的数据文件
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add news_data.js
          git commit -m "🤖 AI 自动更新（北京时间 7点/14点）" || echo "无变化"
          git push
